<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 - CarryOn</title>
    <link rel="stylesheet" href="../css/base.css">
</head>
<body>
    <div class="container">
        <div class="text-center mt-4 mb-4">
            <h1>CarryOn</h1>
            <p style="color: var(--text-muted);">新しいアカウントを作成</p>
        </div>

        <div class="card">
            <h2>新規登録</h2>
            <div id="error-msg" class="error"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="username">ユーザー名</label>
                    <input type="text" id="username" placeholder="名前を入力" required>
                </div>
                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" placeholder="パスワードを入力" required>
                </div>
                <button type="submit" class="btn-primary">登録する</button>
            </form>
        </div>

        <p class="text-center mt-4">
            <a href="login.html">すでにアカウントをお持ちの方はこちら</a>
        </p>
    </div>
    <script type="module" src="../js/pages/register.js"></script>
</body>
</html>
