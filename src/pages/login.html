<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン</title>
    <link rel="stylesheet" href="../css/base.css" />
  </head>
  <body>
    <div class="container">
      <div class="text-center mt-4 mb-4">
        <h1>CarryOn</h1>
        <p style="color: var(--text-muted);">スマートな持ち物チェック</p>
      </div>

      <div class="card">
        <h2>ログイン</h2>
        <div id="error-msg" class="error"></div>

        <div class="form-group">
          <label for="username">ユーザー名</label>
          <input type="text" id="username" placeholder="名前を入力" />
        </div>

        <div class="form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" placeholder="パスワードを入力" />
        </div>

        <button id="login-btn" class="btn-primary">はじめる</button>
      </div>

      <p class="text-center mt-4">
        <a href="register.html">新規ユーザーの方はこちら</a>
      </p>
    </div>
    <script type="module" src="../js/pages/login.js"></script>
  </body>
</html>
